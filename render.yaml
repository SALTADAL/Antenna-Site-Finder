# Render Blueprint for the Antenna Site Finder backend.
# Render reads this when you click "New > Blueprint" and point it at the repo.
# https://render.com/docs/blueprint-spec
#
# Free tier behavior:
#   - Service sleeps after 15 minutes of inactivity
#   - First request after sleep takes 30-60 seconds to wake up
#   - 750 free hours/month (enough for a single 24/7 service)
#   - NO persistent disk (Starter plan only, $7/mo). The SQLite cache and
#     outreach state are wiped on every deploy AND every sleep/wake cycle.
#     Use the CSV export to preserve any work that matters.
#
# To upgrade to always-on + persistent data:
#   1. Change `plan: free` to `plan: starter`
#   2. Uncomment the `disk:` block at the bottom
#   3. Change CACHE_DB_PATH and LOG_FILE values to /var/data/...
#   4. Push the change. Render redeploys with the new tier.

services:
  - type: web
    name: asf-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz

    # Render sets $PORT automatically. Override the Dockerfile CMD to bind to it.
    dockerCommand: >-
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Environment variables. The secret ones (API keys) you'll fill in
    # via the Render dashboard after the first deploy.
    envVars:
      - key: APP_MODE
        value: live
      # Ephemeral paths inside the container. These reset on every deploy
      # and every sleep/wake cycle. To make them durable, upgrade to
      # plan: starter and re-enable the disk block at the bottom.
      - key: CACHE_DB_PATH
        value: /tmp/cache.db
      - key: LOG_FILE
        value: /tmp/app.log
      - key: GOOGLE_MAPS_API_KEY
        sync: false   # set in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false   # set in Render dashboard
      - key: FRONTEND_ORIGIN
        sync: false   # set in Render dashboard after Netlify gives you a URL

    # ----------------------------------------------------------------------
    # Persistent disk. Disabled on free tier. Uncomment AFTER upgrading the
    # plan above to "starter" if you want cache + outreach data to survive
    # deploys.
    # ----------------------------------------------------------------------
    # disk:
    #   name: asf-data
    #   mountPath: /var/data
    #   sizeGB: 1
