services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asf_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot reload during dev. Remove for prod-like runs.
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      # Persist the cache and logs on the host so they survive `compose down`.
      # We mount a parent dir, not a single file, so SQLite can create
      # the cache.db file on first boot without docker mis-creating a
      # directory at the file path.
      - ./backend/data_runtime:/app/runtime
      - ./backend/logs:/app/logs
    environment:
      - CACHE_DB_PATH=/app/runtime/cache.db
      - LOG_FILE=/app/logs/app.log
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asf_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
    depends_on:
      - backend
